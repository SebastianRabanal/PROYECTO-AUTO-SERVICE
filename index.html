<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Kiosco de Pedidos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/logo-autoservice.ico">
</head>
<body>

    <header class="encabezado-principal">
        <h1>Haz tu pedido aquí</h1>
    </header>

    <main id="contenedor-principal">
        
        <section id="seccion-productos">
            <h2>Nuestra Carta</h2>
            
            <div class="cuadricula-productos">
                <div class="tarjeta-producto" id="prod-hamburguesa">
                    <h3>Hamburguesa Clásica</h3>
                    <img src="images/hamburguesa-clasica.webp" alt="Hamburguesa Clasica" class="img-producto">
                    <p>S/ 15.00</p>
                    <button class="btn-seleccionar">Personalizar</button>
                </div>
                
                <div class="tarjeta-producto" id="prod-pizza">
                    <h3>Pizza Personal</h3>
                    <img src="images/pizza.webp" alt="Pizza Clasica" class="img-producto">
                    <p>S/ 12.00</p>
                    <button class="btn-seleccionar">Personalizar</button>
                </div>

                <div class="tarjeta-producto" id="prod-cafe">
                    <h3>Café Pasado</h3>
                    <img src="images/cafe pasado.webp" alt="Cafe Pasado" class="img-producto">
                    <p>S/ 6.00</p>
                    <button class="btn-seleccionar">Personalizar</button>
                </div>
            </div>

            <div id="zona-personalizacion" class="oculto">
                <h3></h3>
                <div id="contenedor-modificadores"></div>

                <button class="btn-agregar-ticket">Agregar al Ticket</button>
            </div>
        </section>

        <aside id="seccion-ticket">
            <h2>Tu Pedido</h2>
            
            <ul id="lista-ticket">
            </ul>

            <div class="total-caja">
                <h3>Total a Pagar: <span id="total-pagar">S/ 0.00</span></h3>
            </div>

            <div id="metodos-pago">
                <div id="metodos-pago">
                <h3>Método de Pago</h3>
                <div class="caja-metodos">
                    <label class="tarjeta-pago">
                        <input type="radio" name="metodo_pago" value="yape" checked>
                        <img src="images/logo-yape.webp" alt="Yape" class="icono-pago"> Yape
                    </label>
                    <label class="tarjeta-pago">
                        <input type="radio" name="metodo_pago" value="plin">
                        <img src="images/logo-plin.webp" alt="Plin" class="icono-pago"> Plin
                    </label>
                    <label class="tarjeta-pago">
                        <input type="radio" name="metodo_pago" value="efectivo">
                        <img src="images/logo-efectivo.webp" alt="Efectivo" class="icono-pago"> Efectivo
                    </label>
                </div>
            </div>
            </div>

            <button id="btn-pagar" class="tu-clase-verde">Pagar y Generar Voucher</button>
        </aside>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
